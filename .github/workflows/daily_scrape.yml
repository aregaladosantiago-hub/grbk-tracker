name: GRBK Daily Scrape

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: |
          python -m grbk_tracker.scrape

      - name: Validate snapshot
        run: |
          python -m grbk_tracker.validate

      - name: Generate report
        run: |
          python -m grbk_tracker.report

      - name: Commit updated outputs
        run: |
          git config user.name "grbk-tracker-bot"
          git config user.email "grbk-tracker-bot@example.com"
          git add data reports
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update GRBK tracker outputs"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
